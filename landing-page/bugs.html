<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report a Bug — Forge Village</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #090d18;
      color: #f5f7fa;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
    }
    .card {
      background: rgba(20, 26, 42, 0.85);
      border: 1px solid rgba(124, 92, 255, 0.15);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 16px; font-size: 24px; }
    p { color: #8892a4; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #7c5cff, #9b7cff);
      color: white; text-decoration: none; border-radius: 10px;
      font-weight: 600;
      transition: box-shadow 0.2s;
    }
    .btn:hover { box-shadow: 0 4px 16px rgba(124,92,255,0.35); }
    .back { display: block; margin-top: 24px; font-size: 14px; color: #8892a4; text-decoration: none; }
    .back:hover { color: #f5f7fa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Report a Bug</h1>
    <p>Found something that isn&apos;t working right? Please let us know on GitHub Issues. Your feedback helps make Forge Village better.</p>
    <a href="https://github.com/dromiuz/forge-village/issues/new" class="btn">Open Issue Form</a>
    <a href="index.html" class="back">&larr; Back to home</a>
  </div>
</body>
</html>
